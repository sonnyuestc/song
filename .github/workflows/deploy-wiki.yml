name: Deploy ZYRO Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_ENABLED: ${{ secrets.ALIYUN_HOST != '' && secrets.ALIYUN_USER != '' && secrets.ALIYUN_SSH_KEY != '' }}

    steps:
      - name: Explain missing deployment secrets
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "Deployment skipped until ALIYUN_HOST, ALIYUN_USER and ALIYUN_SSH_KEY are configured."

      - name: Check out source
        if: env.DEPLOY_ENABLED == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: env.DEPLOY_ENABLED == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.DEPLOY_ENABLED == 'true'
        run: npm ci

      - name: Build Wiki package
        if: env.DEPLOY_ENABLED == 'true'
        run: npm run package:wiki

      - name: Configure SSH
        if: env.DEPLOY_ENABLED == 'true'
        env:
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_PRIVATE_KEY"
          SSH_PORT="${SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload only the Wiki subsite
        if: env.DEPLOY_ENABLED == 'true'
        env:
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
          SSH_USER: ${{ secrets.ALIYUN_USER }}
          REMOTE_PATH: ${{ secrets.ALIYUN_WIKI_PATH }}
        run: |
          test -n "$SSH_USER"
          SSH_PORT="${SSH_PORT:-22}"
          REMOTE_PATH="${REMOTE_PATH:-/var/www/zyro-wiki/wiki}"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_PATH'"
          rsync -az --delete -e "ssh -p $SSH_PORT" \
            outputs/zyro-wiki-upload/wiki/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"
